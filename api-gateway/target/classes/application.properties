server.port = 8082
spring.application.name=api-gateway
#user-service
spring.cloud.gateway.routes[0].id=userservice
spring.cloud.gateway.routes[0].uri=http://localhost:8081
#spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
#auth-service
spring.cloud.gateway.routes[1].id=authservice
spring.cloud.gateway.routes[1].uri=http://localhost:8083
#spring.cloud.gateway.routes[1].uri=lb://authentication-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**
#compliance-service
spring.cloud.gateway.routes[2].id=complianceservice
spring.cloud.gateway.routes[2].uri=http://localhost:8085
#spring.cloud.gateway.routes[2].uri=lb://complianceservice
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/audit/**, /api/compliance/**

# project-service
spring.cloud.gateway.routes[3].id=projectservice
spring.cloud.gateway.routes[3].uri=http://localhost:8089
#spring.cloud.gateway.routes[3].uri=lb://project-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/projects/**, /api/resources/**

# citizen-service
spring.cloud.gateway.routes[4].id=citizenservice
spring.cloud.gateway.routes[4].uri=http://localhost:8190
#spring.cloud.gateway.routes[4].uri=lb://citizenservice
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/citizen/**, /api/feedback/**

# notification-service
spring.cloud.gateway.routes[5].id=notificationservice
spring.cloud.gateway.routes[5].uri=http://localhost:9191
#spring.cloud.gateway.routes[5].uri=lb://microservice-notify
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
