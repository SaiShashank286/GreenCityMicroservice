spring.application.name=project-service
server.port=${PROJECT_SERVICE_PORT:8089}

# MySQL (adjust user/password/database in MySQL Workbench or here)
spring.datasource.url=jdbc:mysql://localhost:3306/projectservice?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate — creates/updates tables from entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka = true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

app.jwt.secret=ThisIsAVeryLongSecretKeyThatIsAtLeast32CharactersLongToSatisfyJJWTRequirements
